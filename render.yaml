services:
  - type: web
    name: biryani-house
    env: static
    buildCommand: ""
    staticPublishPath: "."
    envVars:
      - key: NODE_VERSION
        value: "18"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: biryani-api
    env: node
    buildCommand: "npm install express body-parser cors uuid"
    startCommand: "node payment-api.js"
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: MTN_SUBSCRIPTION_KEY
        value: "YOUR_SUBSCRIPTION_KEY"
      - key: MTN_API_KEY
        value: "YOUR_API_KEY"
      - key: MTN_API_SECRET
        value: "YOUR_API_SECRET"
